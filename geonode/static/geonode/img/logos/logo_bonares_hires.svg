<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
    <!-- BonaRes Logo (Soil focus - Brown tones) -->
    <defs>
        <linearGradient id="bonares_grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7cb342;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#558b2f;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="100" fill="url(#bonares_grad)" />
    <text x="100" y="35" font-size="16" font-weight="bold" text-anchor="middle" fill="white"
        font-family="Arial, sans-serif">
        BonaRes
    </text>
    <text x="100" y="60" font-size="11" text-anchor="middle" fill="white"
        font-family="Arial, sans-serif">
        Soil as Resource
    </text>
</svg>