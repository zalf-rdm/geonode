<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
    <!-- EJP SOIL - European Joint Programme on Soil -->
    <defs>
        <linearGradient id="ejpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#5d4a2f;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="100" fill="url(#ejpGrad)" />
    <text x="100" y="40" font-size="16" font-weight="bold" text-anchor="middle" fill="white"
        font-family="Arial, sans-serif">
        EJP
    </text>
    <text x="100" y="65" font-size="14" font-weight="bold" text-anchor="middle" fill="white"
        font-family="Arial, sans-serif">
        SOIL
    </text>
</svg>