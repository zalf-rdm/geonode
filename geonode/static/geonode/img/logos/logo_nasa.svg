<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
    <!-- NASA - National Aeronautics and Space Administration (Red & blue) -->
    <defs>
        <linearGradient id="nasaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#e81b23;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0b3d91;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="100" fill="url(#nasaGrad)" />
    <text x="100" y="58" font-size="28" font-weight="bold" text-anchor="middle" fill="white"
        font-family="Arial, sans-serif">
        NASA
    </text>
</svg>