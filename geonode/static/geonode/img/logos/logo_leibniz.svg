<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
    <!-- Leibniz Association (Color: Leibniz Blue) -->
    <defs>
        <linearGradient id="leibnizGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#003d99;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="100" fill="url(#leibnizGrad)" />
    <text x="100" y="45" font-size="22" font-weight="bold" text-anchor="middle" fill="white"
        font-family="Arial, sans-serif">
        Leibniz
    </text>
    <text x="100" y="70" font-size="12" text-anchor="middle" fill="white"
        font-family="Arial, sans-serif">
        Association
    </text>
</svg>