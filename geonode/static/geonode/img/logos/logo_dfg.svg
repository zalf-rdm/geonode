    </defs>
    <rect width="200" height="100" fill="url(#dfgGrad)" />
    <text x="100" y="58" font-size="32" font-weight="bold" text-anchor="middle" fill="white"
        font-family="Arial, sans-serif">
        DFG
    </text>
</svg>
